<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="BuilderOffice - 건설현장 비용, 인원, 자재 통합 관리 시스템">
  <title>BuilderOffice | V-ERP Portal</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/portal.css">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏗️</text></svg>">
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
</head>

<body class="vibrant-mode">
  <!-- Dynamic Background Blobs for Option B Style -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="app-container">

    <!-- Top Global Navigation Bar -->
    <header class="top-gnb">
      <div class="gnb-left">
        <a href="#dashboard" class="logo nav-item" data-page="dashboard">
          <span class="logo-icon">🏗️</span>
          <span class="logo-text">BuilderOffice V-ERP</span>
        </a>
        <!-- 현장 선택기 -->
        <div class="site-selector-wrap">
          <select id="siteSelector" class="site-selector">
            <option value="all">📍 전체 현장</option>
          </select>
        </div>
        <nav class="gnb-menu">
          <a href="#dashboard" class="nav-item" data-page="dashboard">대시보드</a>
          <!-- 공무 (Admin) -->
          <div class="gnb-more-wrap">
            <button class="gnb-more-btn nav-item">공무 ▾</button>
            <div class="gnb-dropdown">
              <a href="#sites" class="gnb-dropdown-item" data-page="sites">🏗️ 현장 관리</a>
              <a href="#dailylog" class="gnb-dropdown-item" data-page="dailylog">📋 현장 일지</a>
              <a href="#contracts" class="gnb-dropdown-item" data-page="contracts">📄 계약/기성</a>
              <a href="#approvals" class="gnb-dropdown-item" data-page="approvals">✅ 전자결재</a>
            </div>
          </div>
          <!-- 안전/품질 (Safety/Quality) -->
          <div class="gnb-more-wrap">
            <button class="gnb-more-btn nav-item">안전/품질 ▾</button>
            <div class="gnb-dropdown">
              <a href="#safety" class="gnb-dropdown-item" data-page="safety">🦺 안전점검/TBM</a>
              <a href="#quality" class="gnb-dropdown-item" data-page="quality">🔍 품질검사</a>
            </div>
          </div>
          <!-- 노무/자재 (Labor/Materials) -->
          <div class="gnb-more-wrap">
            <button class="gnb-more-btn nav-item">노무/자재 ▾</button>
            <div class="gnb-dropdown">
              <a href="#personnel" class="gnb-dropdown-item" data-page="personnel">👷 인원 관리</a>
              <a href="#materials" class="gnb-dropdown-item" data-page="materials">📦 자재 관리</a>
            </div>
          </div>
          <!-- 경리 (Accounting) -->
          <div class="gnb-more-wrap">
            <button class="gnb-more-btn nav-item">경리 ▾</button>
            <div class="gnb-dropdown">
              <a href="#costs" class="gnb-dropdown-item" data-page="costs">💰 비용 관리</a>
              <a href="#reports" class="gnb-dropdown-item" data-page="reports">📈 보고서</a>
            </div>
          </div>
        </nav>
      </div>
      <div class="gnb-right">
        <div class="header-search gnb-search-hide">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="통합 검색..." id="globalSearch">
        </div>
        <button class="icon-btn" title="알림" onclick="App.navigate('approvals')" id="notifBtn">🔔</button>
        <button class="icon-btn" title="내 정보/설정">👤</button>
      </div>
    </header>

    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-bottom-nav">
      <a href="#dashboard" class="mbn-item nav-item" data-page="dashboard">
        <span class="mbn-icon">🏠</span><span class="mbn-label">홈</span>
      </a>
      <a href="#dailylog" class="mbn-item nav-item" data-page="dailylog">
        <span class="mbn-icon">📋</span><span class="mbn-label">현장일지</span>
      </a>
      <a href="#personnel" class="mbn-item nav-item" data-page="personnel">
        <span class="mbn-icon">👷</span><span class="mbn-label">인원</span>
      </a>
      <a href="#safety" class="mbn-item nav-item" data-page="safety">
        <span class="mbn-icon">🦺</span><span class="mbn-label">안전</span>
      </a>
      <button class="mbn-item mbn-more-btn" onclick="App.toggleMobileMore()">
        <span class="mbn-icon">☰</span><span class="mbn-label">더보기</span>
      </button>
    </nav>

    <!-- Mobile More Drawer -->
    <div class="mobile-more-overlay" id="mobileMoreOverlay" onclick="App.closeMobileMore()"></div>
    <div class="mobile-more-drawer" id="mobileMoreDrawer">
      <div class="mmd-title">메뉴</div>
      <div class="mmd-section-title">공무</div>
      <a href="#sites" class="mmd-item nav-item" data-page="sites" onclick="App.closeMobileMore()">
        <span>🏗️</span><span>현장 관리</span>
      </a>
      <a href="#dailylog" class="mmd-item nav-item" data-page="dailylog" onclick="App.closeMobileMore()">
        <span>📋</span><span>현장 일지</span>
      </a>
      <a href="#contracts" class="mmd-item nav-item" data-page="contracts" onclick="App.closeMobileMore()">
        <span>📄</span><span>계약/기성</span>
      </a>
      <a href="#approvals" class="mmd-item nav-item" data-page="approvals" onclick="App.closeMobileMore()">
        <span>✅</span><span>전자결재</span>
      </a>
      <div class="mmd-section-title">안전/품질</div>
      <a href="#safety" class="mmd-item nav-item" data-page="safety" onclick="App.closeMobileMore()">
        <span>🦺</span><span>안전점검/TBM</span>
      </a>
      <a href="#quality" class="mmd-item nav-item" data-page="quality" onclick="App.closeMobileMore()">
        <span>🔍</span><span>품질검사</span>
      </a>
      <div class="mmd-section-title">노무/자재</div>
      <a href="#personnel" class="mmd-item nav-item" data-page="personnel" onclick="App.closeMobileMore()">
        <span>👷</span><span>인원 관리</span>
      </a>
      <a href="#materials" class="mmd-item nav-item" data-page="materials" onclick="App.closeMobileMore()">
        <span>📦</span><span>자재 관리</span>
      </a>
      <div class="mmd-section-title">경리</div>
      <a href="#costs" class="mmd-item nav-item" data-page="costs" onclick="App.closeMobileMore()">
        <span>💰</span><span>비용 관리</span>
      </a>
      <a href="#reports" class="mmd-item nav-item" data-page="reports" onclick="App.closeMobileMore()">
        <span>📈</span><span>보고서</span>
      </a>
    </div>

    <!-- Main Content Area -->
    <main class="main-content">
      <!-- Portal Home / Dashboard Page Content -->
      <div class="page-content" id="pageContent">
        <!-- Dashboard content will be injected or initially handled by dashboard.js, but we'll put the static portal structure here to be moved to dashboard.js or kept in index.html -->
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent"></div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Scripts -->
  <script src="js/store.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/costs.js"></script>
  <script src="js/personnel.js"></script>
  <script src="js/materials.js"></script>
  <script src="js/sites.js"></script>
  <script src="js/dailylog.js"></script>
  <script src="js/reports.js"></script>
  <script src="js/approvals.js"></script>
  <script src="js/safety.js"></script>
  <script src="js/quality.js"></script>
  <script src="js/contracts.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
